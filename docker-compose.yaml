version: '3.7'

services:
  mysql:
    image: mysql:8
    container_name: mysql
    volumes:
      - db:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rocketseat-db
      MYSQL_USER: admin
      MYSQL_PASSWORD: root
    networks:
      - my-first-network

  api-rocket:
    build:
      context: .
    container_name: api-rocket
    ports:
      - "3001:3000"
    depends_on:
      - mysql
    networks:
      - my-first-network

networks:
  my-first-network:
    name: my-first-network
    external: true
    driver: bridge

volumes:
  db:

